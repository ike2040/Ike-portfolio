<svg width="240" height="80" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Brand Icon -->
  <defs>
    <!-- Cyber Cyan Planet Core -->
    <linearGradient id="planetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <!-- Accent Color -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- The Planet Sphere -->
  <circle cx="40" cy="40" r="22" fill="url(#sphereGrad)" />

  <!-- The Orbiting Ring (Swoosh) -->
  <path d="M15,45 Q20,60 40,55 Q65,48 70,30" 
        fill="none" 
        stroke="url(#ringGrad)" 
        stroke-width="4.5" 
        stroke-linecap="round" />
  
  <path d="M18,35 Q30,15 60,25" 
        fill="none" 
        stroke="url(#ringGrad)" 
        stroke-width="4.5" 
        stroke-linecap="round" 
        opacity="0.8" />

  <!-- The Star/Sparkle -->
  <g transform="translate(68, 28) scale(0.6)">
    <path d="M0,-15 L3,-3 L15,0 L3,3 L0,15 L-3,3 L-15,0 L-3,-3 Z" fill="white" />
    <circle cx="0" cy="0" r="3" fill="white" />
  </g>

  <!-- Brand Text -->
  <text x="85" y="52" font-family="'Montserrat', sans-serif" font-weight="800" font-size="28" fill="#111827">Web<tspan fill="#38bdf8">Crest</tspan></text>
</svg>
